name: Build Single Aniyomi Extension

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    name: Compile anime3rb Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission to Gradlew
        run: chmod +x ./gradlew

      # Fixes formatting errors ONLY for anime3rb
      - name: Auto-Format Code with Spotless
        run: ./gradlew :src:ar:anime3rb:spotlessApply

      # Compiles ONLY the anime3rb APK
      - name: Build anime3rb APK Only
        run: ./gradlew :src:ar:anime3rb:assembleRelease

      # Grabs ONLY the finished anime3rb APK
      - name: Upload anime3rb APK
        uses: actions/upload-artifact@v4
        with:
          name: anime3rb-APK
          path: "src/ar/anime3rb/build/outputs/apk/release/*.apk"
